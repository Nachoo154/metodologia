{% load static %}
<!DOCTYPE HTML>
<html>

<head>
    <title>Body Paint</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <style>
        html {
            scroll-behavior: smooth;
        }

        .topbar {
            background: #1f2937;
            color: #fff;
            padding: 12px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }

        .topbar-nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            flex-wrap: wrap;
        }

        .topbar-brand {
            color: #fff;
            font-weight: 900;
            font-size: 2.15rem;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0;
            margin: 0;
            text-shadow: 0 2px 14px rgba(255, 255, 255, 0.16);
        }

        .topbar-links {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .topbar-nav a {
            color: #fff;
            text-decoration: none;
            padding: 6px 10px;
            border-radius: 6px;
            transition: background-color 0.2s ease;
        }

        .topbar-nav a:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .floating-cart-button {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 52px;
            height: 52px;
            padding: 0;
            background-color: #f56a6a;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 700;
            font-size: 1.1rem;
            border-radius: 999px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .floating-cart-button:hover {
            background-color: #f67878;
        }

        #banner .content header p {
            margin-top: 0.5em;
            color: #4b5563;
        }

        #banner .content header h1 {
            animation: textFloatIn 0.85s ease-out;
        }

        #productos .posts article {
            display: flex;
            flex-direction: column;
            height: 100%;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        #productos .posts article:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(31, 41, 55, 0.14);
        }

        #productos .posts article .actions {
            margin-top: auto;
        }

        #productos .posts article form {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        #productos .posts article input[type="number"] {
            width: 84px;
            margin-bottom: 0;
        }

        .button,
        button,
        input[type="submit"] {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover,
        button:hover,
        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(31, 41, 55, 0.18);
        }

        body.has-anim .reveal-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        body.has-anim .reveal-item.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes textFloatIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="is-preload">
    <header class="topbar">
        <nav class="topbar-nav">
            {% if request.path != '/' %}
            <a href="{% url 'home' %}" class="topbar-brand">Body Paint</a>
            {% else %}
            <span class="topbar-brand">Body Paint</span>
            {% endif %}
            <div class="topbar-links">
                <a href="{% url 'home' %}#productos">Productos</a>
                {% if request.session.user_email %}
                <a href="{% url 'logout' %}">Cerrar sesi&oacute;n</a>
                {% else %}
                <a href="{% url 'login' %}">Iniciar sesi&oacute;n</a>
                {% endif %}
            </div>
        </nav>
    </header>

    {% block content %}
    {% endblock %}

    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/browser.min.js' %}"></script>
    <script src="{% static 'js/breakpoints.min.js' %}"></script>
    <script src="{% static 'js/util.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var revealItems = document.querySelectorAll("#main .inner > section, #main .inner > header");
            if (!revealItems.length || !("IntersectionObserver" in window)) {
                return;
            }

            document.body.classList.add("has-anim");
            revealItems.forEach(function (item) {
                item.classList.add("reveal-item");
            });

            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("is-visible");
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });

            revealItems.forEach(function (item) {
                observer.observe(item);
            });
        });
    </script>

</body>

</html>
