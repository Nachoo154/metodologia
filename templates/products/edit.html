<h2>Editar producto</h2>

{% if error %}<p style="color: red;">{{ error }}</p>{% endif %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" name="current_image" value="{{ product.image }}">
    <input type="text" name="name" value="{{ product.name }}"><br><br>
    <input type="number" step="0.01" name="price" value="{{ product.price }}"><br><br>
    <input type="number" name="stock" min="0" value="{{ product.stock }}"><br><br>
    {% if product.image %}<img src="{{ product.image }}" alt="{{ product.name }}" style="width: 120px;"><br><br>{% endif %}
    <input type="file" name="image" accept="image/jpeg,image/png,image/webp,image/gif"><br><br>
    <input type="url" name="image_url" placeholder="Nueva URL de imagen alternativa"><br><br>
    <textarea name="description">{{ product.description }}</textarea><br><br>
    <button type="submit">Actualizar</button>
</form>

<a href="/products/">Volver</a>
