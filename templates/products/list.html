<h2>Productos</h2>

<p>
    <a href="/cart/">Ver carrito ({{ cart_count|default:0 }})</a>
</p>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Stock</th>
        <th>Imagen</th>
        <th>Acciones</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{ p.name }}</td>
        <td>${{ p.price }}</td>
        <td>{{ p.stock }}</td>
        <td>{% if p.image %}<img src="{{ p.image }}" alt="{{ p.name }}" style="width: 80px; height: 60px; object-fit: cover;">{% else %}-{% endif %}</td>
        <td>
            <form method="POST" action="/cart/add/{{ p.id }}/">
                {% csrf_token %}
                <input type="number" name="quantity" value="1" min="1" max="{{ p.stock }}" style="width: 60px;">
                <button type="submit">Agregar al carrito</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>
