<h2>Crear producto</h2>

{% if error %}<p style="color: red;">{{ error }}</p>{% endif %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Nombre"><br><br>
    <input type="number" step="0.01" name="price" placeholder="Precio"><br><br>
    <input type="number" name="stock" placeholder="Stock" min="0" value="0"><br><br>
    <input type="file" name="image" accept="image/jpeg,image/png,image/webp,image/gif"><br><br>
    <input type="url" name="image_url" placeholder="URL de imagen alternativa"><br><br>
    <textarea name="description" placeholder="Descripcion"></textarea><br><br>
    <button type="submit">Guardar</button>
</form>

<a href="/products/">Volver</a>
